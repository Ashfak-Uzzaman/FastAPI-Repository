<!-- Template inheritance -->
{% extends "layout.html" %} 

<!-- The child overrides the content block -->
{% block content %}
    {% for post in posts %}
        <h2>{{ posts.title }}</h2>
        <h3>{{ post.author }}</h3>
        <p>{{ post.content }}</p>
        <br>
    {% endfor %}
{% endblock content %}

<!-- home.html = child template -->
<!-- The child overrides the content block -->
<!-- `content` is the name of a template block. -->
